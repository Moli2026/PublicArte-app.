<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú PublicArte</title>
    <style>
        body { background-color: #6a5acd; color: white; font-family: Arial; text-align: center; padding: 20px; }
        .grid-redes { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 50px; }
        .card { background: white; color: #6a5acd; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; }
        .btn-volver { margin-top: 50px; color: white; text-decoration: underline; cursor: pointer; display: block; }
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PublicArte App</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <h2>¿Con qué red arrancamos hoy?</h2>
    <div class="grid-redes">
        <a href="#" class="card">FACEBOOK</a>
        <a href="#" class="card">INSTAGRAM</a>
        <a href="#" class="card">TIKTOK</a>
        <a href="#" class="card">GOOGLE ADS</a>
    </div>
    <a href="index.html" class="btn-volver">Volver al Inicio</a>
</body>
</html>
